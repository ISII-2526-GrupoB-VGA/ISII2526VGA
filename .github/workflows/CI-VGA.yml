# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Continuous Deployment of AppForSEII2526.API latest changes

on:
  push:
    branches:
      # Solo desplegar cuando se hace push a development
      - development
    paths:
      # Se dispara cuando cambie algo en tu API o en los tests
      - 'src/AppForSEII2526.API/**'
      - 'test/AppForSEII2526.UT/**'

  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read # requerido para actions/checkout
    env:
      API: ./src/AppForSEII2526.API/AppForSEII2526.API.csproj
      WEB: ./src/AppForSEII2526.Web/AppForSEII2526.Web.csproj
      UT:  ./test/AppForSEII2526.UT/AppForSEII2526.UT.csproj
      UIT: ./test/AppForSEII2526.UIT/AppForSEII2526.UIT.csproj

    steps:
      - name: Check out repository code branch development
        uses: actions/checkout@v4
        with:
          ref: 'development'

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore dependencies
        run: |
          dotnet restore ${{ env.API }}
          dotnet restore ${{ env.UT }}

      - name: Build with dotnet
        run: |
          dotnet build ${{ env.API }} --configuration Release --no-restore
          dotnet build ${{ env.UT }}  --configuration Release --no-restore

      - name: Run unit tests with report
        run: dotnet test ${{ env.UT }} --configuration Release --no-build --logger "trx;LogFileName=TestResults.trx"

      - name: dotnet publish
        run: dotnet publish ${{ env.API }} -c Release -o "${{ env.DOTNET_ROOT }}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ env.DOTNET_ROOT }}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write   # requerido para pedir el JWT
      contents: read    # requerido para actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          # OJO: usa aquí los secretos que te haya creado Azure
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_COMPRARDISPOSITIVOS }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_COMPRARDISPOSITIVOS }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_COMPRARDISPOSITIVOS }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'comprardispositivos'   # nombre de tu App Service en Azure
          slot-name: 'Production'
          package: .
